<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dreamair — Hotel comparison & AI review guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <style>
    :root {
      --sky-0: #f0f7ff;
      --sky-1: #e1efff;
      --sky-2: #c8e0fe;
      --sky-3: #9ec8fc;
      --sky-4: #6aaef7;
      --sky-5: #3d8ee8;
      --dream: #7b68d4;
      --dream-soft: rgba(123, 104, 212, 0.15);
      --cloud: #ffffff;
      --text: #1a2332;
      --text-soft: #4a5f7f;
      --text-muted: #7a8fa8;
      --border: rgba(26, 35, 50, 0.08);
      --shadow: 0 20px 50px rgba(26, 35, 50, 0.12);
      --radius: 16px;
      --radius-sm: 10px;
      --transition: 200ms ease-out;
      --max-w: 1100px;
      --nav-h: 72px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "DM Sans", system-ui, sans-serif;
      background: linear-gradient(180deg, var(--sky-0) 0%, var(--sky-1) 25%, var(--sky-2) 60%, #e8f2fc 100%);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 50% at 50% -10%, var(--dream-soft), transparent 50%),
                  radial-gradient(ellipse 60% 40% at 80% 20%, rgba(106, 174, 247, 0.2), transparent 45%);
      pointer-events: none;
      z-index: 0;
    }
    .wrap { position: relative; z-index: 1; max-width: var(--max-w); margin: 0 auto; padding: 0 24px; }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: "Playfair Display", serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--dream);
      letter-spacing: 0.02em;
    }
    .logo span { color: var(--sky-5); }
    nav { display: flex; align-items: center; gap: 28px; }
    nav a {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-soft);
      text-decoration: none;
      transition: color var(--transition);
    }
    nav a:hover { color: var(--dream); }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
      border: none;
      font-family: inherit;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--dream), var(--sky-5));
      color: white;
      box-shadow: 0 8px 24px rgba(123, 104, 212, 0.35);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(123, 104, 212, 0.4);
    }
    .btn-ghost {
      background: transparent;
      color: var(--text-soft);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--sky-1); color: var(--text); }
    .hero {
      padding: 80px 0 100px;
      text-align: center;
    }
    .hero h1 {
      font-family: "Playfair Display", serif;
      font-size: clamp(2.2rem, 5vw, 3.2rem);
      font-weight: 600;
      color: var(--text);
      line-height: 1.2;
      max-width: 640px;
      margin: 0 auto 20px;
    }
    .hero h1 em { color: var(--dream); font-style: normal; }
    .hero p {
      font-size: 1.1rem;
      color: var(--text-soft);
      max-width: 520px;
      margin: 0 auto 32px;
      line-height: 1.6;
    }
    .hero .btns { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    section {
      padding: 64px 0;
      border-top: 1px solid var(--border);
    }
    .section-title {
      font-family: "Playfair Display", serif;
      font-size: 1.75rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }
    .section-desc {
      font-size: 0.95rem;
      color: var(--text-soft);
      margin-bottom: 28px;
      max-width: 560px;
    }
    .card {
      background: var(--cloud);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 24px;
      transition: box-shadow var(--transition), transform var(--transition);
    }
    .card:hover {
      box-shadow: 0 24px 56px rgba(26, 35, 50, 0.14);
      transform: translateY(-2px);
    }
    .compare-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .hotel-card {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .hotel-card .name {
      font-weight: 600;
      font-size: 1.05rem;
      color: var(--text);
    }
    .hotel-card .meta {
      font-size: 0.85rem;
      color: var(--text-muted);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .score-ring {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: conic-gradient(var(--sky-5) calc(var(--p, 0) * 1%), var(--sky-2) 0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
    }
    .score-ring span { background: var(--cloud); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .review-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: start;
    }
    @media (max-width: 768px) { .review-panel { grid-template-columns: 1fr; } }
    .review-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .review-item {
      padding: 14px 16px;
      background: var(--sky-1);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }
    .review-item .head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .review-item .score { font-weight: 600; color: var(--dream); }
    .review-item .text { font-size: 0.9rem; color: var(--text-soft); line-height: 1.5; }
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }
